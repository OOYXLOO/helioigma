<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Helioigma Smoke Test</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f3df;
      --muted: #aeb8c5;
      --line: rgba(255, 255, 255, 0.16);
      --panel: rgba(9, 14, 24, 0.86);
      --accent: #f7c948;
      --ok: #b8f2c8;
      --bad: #ff7a59;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, #07131b 0%, #15121f 48%, #201018 100%);
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p, li {
      color: var(--muted);
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 16px;
      margin-top: 24px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--accent);
      font-weight: 800;
    }

    .status.pass { color: var(--ok); }
    .status.fail { color: var(--bad); }

    iframe {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 11;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #071018;
    }

    code {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 5px;
      border-radius: 4px;
    }

    a {
      color: var(--accent);
      font-weight: 800;
    }

    @media (max-width: 780px) {
      .grid { grid-template-columns: 1fr; }
      iframe { aspect-ratio: 4 / 5; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Helioigma smoke test</h1>
    <p>This page runs the real game in an iframe, checks the one-click judge demo receipt, then solves all four phases through keyboard controls and checks that the final status reports a completed longest-day solve.</p>
    <div id="status" class="status">Running...</div>

    <section class="grid">
      <div class="panel">
        <h2>Checks</h2>
        <ul id="checks"></ul>
        <p><a href="./">Open the playable game</a></p>
      </div>
      <div class="panel">
          <iframe id="gameFrame" src="./?v=20260614-mobile-review" title="Helioigma game under smoke test"></iframe>
      </div>
    </section>
  </main>

  <script>
    const levelLengths = [6, 7, 8, 9];
    const checks = document.querySelector("#checks");
    const status = document.querySelector("#status");
    const frame = document.querySelector("#gameFrame");

    function addCheck(text, ok) {
      const li = document.createElement("li");
      li.textContent = `${ok ? "PASS" : "FAIL"} - ${text}`;
      li.style.color = ok ? "var(--ok)" : "var(--bad)";
      checks.appendChild(li);
      if (!ok) throw new Error(text);
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function waitFor(predicate, label, timeout = 9000) {
      const started = performance.now();
      while (performance.now() - started < timeout) {
        if (predicate()) return;
        await sleep(80);
      }
      throw new Error(label);
    }

    function press(win, key) {
      win.dispatchEvent(new KeyboardEvent("keydown", { key, bubbles: true }));
    }

    async function solvePhase(win, length) {
      for (let index = 0; index < length; index += 1) {
        const rotations = (4 - (1 + (index % 3))) % 4;
        for (let count = 0; count < rotations; count += 1) {
          press(win, String(index + 1));
          await sleep(18);
        }
      }
      await sleep(80);
    }

    async function run() {
      await new Promise((resolve) => {
        if (frame.contentDocument?.readyState === "complete") resolve();
        frame.addEventListener("load", resolve, { once: true });
      });
      await sleep(200);

      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      const canvas = doc.querySelector("#game");
      const startButton = doc.querySelector("#startButton");
      const resetButton = doc.querySelector("#resetButton");
      const hintButton = doc.querySelector("#hintButton");
      const demoButton = doc.querySelector("#demoButton");
      const soundButton = doc.querySelector("#soundButton");
      const dayMeter = doc.querySelector("#dayMeter");
      const dayMeterFill = doc.querySelector("#dayMeterFill");
      const dayMeterLabel = doc.querySelector("#dayMeterLabel");
      const playRule = doc.querySelector(".play-rule");
      const phaseObjective = doc.querySelector("#phaseObjective");
      const phaseTargetLine = doc.querySelector("#phaseTargetLine");
      const phaseAlignment = doc.querySelector("#phaseAlignment");
      const phaseProof = doc.querySelector("#phaseProof");
      const judgePathCards = doc.querySelectorAll(".judge-path article");
      const nodeButtons = doc.querySelectorAll("#nodeButtons .node-button");
      const judgeLinks = doc.querySelectorAll(".judge-links a");
      const statusLine = doc.querySelector("#statusLine");
      const scoreLabel = doc.querySelector("#scoreLabel");
      const bestLabel = doc.querySelector("#bestLabel");
      const shiftLabel = doc.querySelector("#shiftLabel");
      const phaseSteps = doc.querySelectorAll("#phaseTrack .phase-step");
      const phaseAnnouncer = doc.querySelector("#phaseAnnouncer");
      const tracePanel = doc.querySelector("#tracePanel");
      const tracePhase = doc.querySelector("#tracePhase");
      const traceMatch = doc.querySelector("#traceMatch");
      const traceNext = doc.querySelector("#traceNext");
      const traceLast = doc.querySelector("#traceLast");
      const proofPanel = doc.querySelector("#proofPanel");
      const proofCode = doc.querySelector("#proofCode");
      const proofSummary = doc.querySelector("#proofSummary");
      const phaseLedger = doc.querySelector("#phaseLedger");
      const verifyProofLink = doc.querySelector("#verifyProofLink");
      const judgeRunSummary = doc.querySelector("#judgeRunSummary");
      const judgeRunSummaryText = doc.querySelector("#judgeRunSummaryText");
      const judgeRunFacts = doc.querySelector("#judgeRunFacts");
      const awardSignals = doc.querySelector("#awardSignals");
      const copyRunSummaryButton = doc.querySelector("#copyRunSummaryButton");
      const nightfallPanel = doc.querySelector("#nightfallPanel");
      const nightfallSummary = doc.querySelector("#nightfallSummary");
      const nightfallFacts = doc.querySelector("#nightfallFacts");
      const retryButton = doc.querySelector("#retryButton");
      const demoRetryButton = doc.querySelector("#demoRetryButton");

      addCheck("canvas is present", Boolean(canvas));
      addCheck("start button is present", Boolean(startButton));
      addCheck("reset button is present", Boolean(resetButton));
      addCheck("hint button is present", Boolean(hintButton));
      addCheck("demo solve button is present", Boolean(demoButton));
      addCheck("audio cue button is present", Boolean(soundButton));
      addCheck("daylight meter is present", Boolean(dayMeter && dayMeterFill && dayMeterLabel));
      addCheck("play rule gives opening-daylight target-glyph receipt path", playRule.textContent.includes("Start with 45s daylight") && playRule.textContent.includes("Match numbered nodes to target glyphs") && playRule.textContent.includes("receipt path"));
      addCheck("start shortcut is exposed", startButton.getAttribute("aria-keyshortcuts") === "Enter");
      addCheck("reset shortcut is exposed", resetButton.getAttribute("aria-keyshortcuts") === "Escape R");
      addCheck("hint shortcut is exposed", hintButton.getAttribute("aria-keyshortcuts") === "H");
      addCheck("demo shortcut is exposed", demoButton.getAttribute("aria-keyshortcuts") === "D");
      addCheck("audio shortcut is exposed", soundButton.getAttribute("aria-keyshortcuts") === "S");
      addCheck("audio cues default off", soundButton.getAttribute("aria-pressed") === "false" && soundButton.textContent.trim() === "Audio");
      addCheck("number-key node shortcuts are exposed", canvas.getAttribute("aria-keyshortcuts") === "1 2 3 4 5 6 7 8 9");
      addCheck("phase objective strip is present", Boolean(phaseObjective && phaseTargetLine && phaseAlignment));
      addCheck("phase objective names the first phase", phaseObjective.textContent.includes("Crib dawn"));
      addCheck("phase objective shows target glyphs and alignment", phaseTargetLine.textContent.includes("SOL LUX XOR BIN") && phaseAlignment.textContent === "0/6 nodes aligned");
      addCheck("phase proof strip is present", Boolean(phaseProof));
      addCheck("phase proof names the first cue", phaseProof.textContent === "Solstice crib starts target checking.");
      addCheck("first-screen judge path is present", judgePathCards.length === 3);
      addCheck("first-phase node buttons are present", nodeButtons.length === levelLengths[0]);
      addCheck("judge shortcut links include the auto demo route", judgeLinks.length === 5 && [...judgeLinks].some((link) => link.textContent.includes("Auto demo")));
      addCheck("status line is present", Boolean(statusLine));
      addCheck("best score label is present", Boolean(bestLabel));
      addCheck("shift counter is present", Boolean(shiftLabel));
      addCheck("four-phase progress track is present", phaseSteps.length === levelLengths.length);
      addCheck("phase announcer is present", Boolean(phaseAnnouncer));
      addCheck("rotor trace panel is present", Boolean(tracePanel && tracePhase && traceMatch && traceNext && traceLast));
      addCheck("rotor trace reports the first phase", tracePhase.textContent.includes("Crib dawn"));
      addCheck("run receipt panel is present", Boolean(proofPanel));
      addCheck("run receipt summary is present", Boolean(proofSummary));
      addCheck("phase scoring ledger is present", Boolean(phaseLedger));
      addCheck("run receipt verifier link is present", Boolean(verifyProofLink));
      addCheck("judge run summary is present", Boolean(judgeRunSummary && judgeRunSummaryText && judgeRunFacts));
      addCheck("award signals are present", Boolean(awardSignals) && awardSignals.querySelectorAll("li").length === 3);
      addCheck("copy judge summary button is present", Boolean(copyRunSummaryButton));
      addCheck("nightfall report panel is present", Boolean(nightfallPanel && nightfallSummary && nightfallFacts));
      addCheck("nightfall action buttons are present", Boolean(retryButton && demoRetryButton));
      addCheck("nightfall report starts hidden", nightfallPanel.hidden === true);

      press(win, "d");
      await waitFor(() => proofPanel.hidden === false, "demo solve did not reveal a receipt");
      addCheck("demo shortcut reaches a deterministic judge receipt", proofCode.textContent === "SC-4P-2907-62-Y5VFX1");
      addCheck("demo receipt summary reports score and shifts", proofSummary.textContent.includes("2907 score") && proofSummary.textContent.includes("62 shifts"));
      addCheck("demo receipt includes four phase ledger entries", phaseLedger.querySelectorAll("li").length === levelLengths.length);
      addCheck("demo receipt verifier link carries the receipt", verifyProofLink.getAttribute("href") === "proof-verifier.html?receipt=SC-4P-2907-62-Y5VFX1");
      addCheck("demo judge run summary reports phases and score", judgeRunSummaryText.textContent.includes("4/4 solstice phases") && judgeRunSummaryText.textContent.includes("2907 score"));
      addCheck("demo judge run facts include receipt and Turing fit", judgeRunFacts.textContent.includes("SC-4P-2907-62-Y5VFX1") && judgeRunFacts.textContent.includes("state alignment + checksum reasoning"));
      addCheck("demo award signals name solstice, Turing, and judge proof", awardSignals.textContent.includes("Solstice loop") && awardSignals.textContent.includes("Turing ode") && awardSignals.textContent.includes("Judge proof"));
      addCheck("copy judge summary button is enabled", copyRunSummaryButton.disabled === false);
      await waitFor(() => demoButton.disabled === false, "demo solve did not release controls");
      addCheck("demo solve releases manual controls", demoButton.disabled === false);

      press(win, "r");
      await sleep(120);
      addCheck("reset shortcut returns to idle", proofPanel.hidden === true && statusLine.textContent.includes("Decode the Helioigma rotor"));

      startButton.click();
      await sleep(120);
      addCheck("start button shows the first-move coach", statusLine.textContent.includes("First move: rotate node 1 toward SOL") && Boolean(doc.querySelector("#nodeButtons .node-button.hinted")));
      addCheck("phase announcer names the active phase", phaseAnnouncer.textContent.includes("Phase 1: Crib dawn"));
      press(win, "h");
      await sleep(80);
      addCheck("hint shortcut names the next mismatched node", statusLine.textContent.includes("Hint: rotate node"));
      addCheck("hint highlights a node button", Boolean(doc.querySelector("#nodeButtons .node-button.hinted")));
      addCheck("rotor trace records hint action", traceLast.textContent.includes("Hint node"));
      addCheck("rotor trace names the next mismatch", traceNext.textContent.includes("Node 1"));

      for (let count = 0; count < 150; count += 1) {
        press(win, "1");
        await sleep(1);
      }
      await waitFor(() => nightfallPanel.hidden === false, "nightfall report did not appear after timeout");
      addCheck("nightfall report appears after timeout", nightfallPanel.hidden === false && statusLine.textContent.includes("Nightfall sealed"));
      addCheck("nightfall report summarizes aligned nodes", nightfallSummary.textContent.includes("nodes aligned") && nightfallSummary.textContent.includes("Retry"));
      addCheck("nightfall report facts include held phases and score", nightfallFacts.textContent.includes("Held phases") && nightfallFacts.textContent.includes("Score"));
      retryButton.click();
      await sleep(120);
      addCheck("nightfall retry starts a new manual run", nightfallPanel.hidden === true && statusLine.textContent.includes("First move: rotate node 1 toward SOL"));

      for (const length of levelLengths) {
        await solvePhase(win, length);
      }

      const finalText = statusLine.textContent;
      const finalScore = Number(scoreLabel.textContent);
      const bestScore = Number(bestLabel.textContent);
      const shiftCount = Number(shiftLabel.textContent);
      addCheck("four phases reach final state", finalText.includes("Longest day held"));
      addCheck("final score is positive", Number.isFinite(finalScore) && finalScore > 0);
      addCheck("best score records the completed run", Number.isFinite(bestScore) && bestScore >= finalScore);
      addCheck("shift counter records the completed run", Number.isFinite(shiftCount) && shiftCount > 0);
      addCheck("final status reports shift count", finalText.includes("shifts"));
      addCheck("completion reveals run receipt", proofPanel.hidden === false);
      addCheck("completion preserves four phase ledger entries", phaseLedger.querySelectorAll("li").length === levelLengths.length);
      addCheck("run receipt encodes phases, score, shifts, and checksum", /^SC-4P-\d+-\d+-[0-9A-Z]{6}$/.test(proofCode.textContent));
      addCheck("completion verifier link carries the final receipt", verifyProofLink.getAttribute("href").includes(encodeURIComponent(proofCode.textContent)));

      status.textContent = `PASS - ${finalText}`;
      status.classList.add("pass");
    }

    run().catch((error) => {
      status.textContent = `FAIL - ${error.message}`;
      status.classList.add("fail");
    });
  </script>
</body>
</html>
