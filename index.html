<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solstice Cipher</title>
  <meta name="description" content="A compact June solstice browser puzzle game inspired by daylight, nightfall, and Alan Turing's code-breaking legacy.">
  <meta property="og:title" content="Solstice Cipher">
  <meta property="og:description" content="Rotate a Turing wheel of solar, XOR, light, and binary glyphs before nightfall.">
  <meta property="og:image" content="cover.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="stage" aria-label="Solstice Cipher game">
      <div class="hud" aria-live="polite">
        <div>
          <p class="kicker">June Solstice Game Jam / Ode to Alan Turing</p>
          <h1>Solstice Cipher</h1>
        </div>
        <div class="stats">
          <span><strong id="levelLabel">1</strong> phase</span>
          <span><strong id="scoreLabel">0</strong> score</span>
          <span><strong id="timeLabel">45</strong>s</span>
        </div>
      </div>

      <canvas id="game" width="960" height="640" tabindex="0" aria-label="Solstice Cipher playfield"></canvas>

      <div class="controls">
        <button id="startButton" type="button">Start</button>
        <button id="resetButton" type="button">Reset</button>
        <div id="statusLine" class="status">Align the ring before nightfall.</div>
      </div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
