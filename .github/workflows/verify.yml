name: Verify Solstice Cipher

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check JavaScript syntax
        run: node --check game.js

      - name: Verify required public package files
        run: |
          set -euo pipefail
          for file in \
            index.html \
            styles.css \
            game.js \
            judge.html \
            smoke.html \
            proof-verifier.html \
            publish-assistant.html \
            publish-after-repo.ps1 \
            public-preflight.ps1 \
            dev-submit-console.html \
            dev-article-final.md \
            verification.html \
            verification-report.md \
            cover.png \
            solstice-cipher-demo.mp4 \
            solstice-cipher-demo.webm \
            solstice-cipher-demo.gif \
            desktop-check-v5.png \
            mobile-check-v6.png \
            desktop-complete-v4.png \
            PUBLISHING.md \
            submission-checklist.md
          do
            test -s "$file"
          done

      - name: Verify DEV challenge submission copy
        run: |
          set -euo pipefail
          grep -q "tags: devchallenge, gamechallenge, gamedev" dev-article-final.md
          grep -q "solstice-cipher-demo.mp4" dev-article-final.md
          grep -q "https://ooyxloo.github.io/solstice-cipher/" dev-article-final.md
          grep -q "Judge in 60 Seconds" dev-article-final.md
          grep -q "Rubric Fit" dev-article-final.md
          grep -q "proof-verifier.html" dev-article-final.md
          grep -q "publish-assistant.html" PUBLISHING.md
          grep -q "devchallenge, gamechallenge, gamedev" dev-submit-console.html
          grep -q "Judge in 60 Seconds" dev-submit-console.html
          grep -q "Rubric Fit" dev-submit-console.html

      - name: Verify judge and smoke links
        run: |
          set -euo pipefail
          grep -q "solstice-cipher-demo.mp4" judge.html
          grep -q "Run Smoke Test" judge.html
          grep -q "verification.html" judge.html
          grep -q "PASS - Longest day held" verification-report.md
          grep -q "SC-4P-2893-62-1I4Y0G" verification-report.md
          grep -q "SC-4P-2893-62-1I4Y0G" proof-verifier.html
          grep -q "No-go gate" publish-assistant.html
          grep -q "publish-after-repo helper" publish-after-repo.ps1
          grep -q "nodeButtons" index.html
          grep -q "phaseTrack" index.html
          grep -q "shiftLabel" index.html
          grep -q "first-phase node buttons are present" smoke.html
          grep -q "four-phase progress track is present" smoke.html
          grep -q "shift counter records the completed run" smoke.html
          grep -q "devchallenge" verification.html
          grep -q "SC-4P" smoke.html
