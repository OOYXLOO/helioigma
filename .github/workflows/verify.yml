      - name: Install package dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run browser smoke on committed package
        run: npm run smoke

      - name: Rebuild demo video
        run: npm run build:video

      - name: Verify rebuilt demo video output
        run: test -s helioigma-demo.webm
