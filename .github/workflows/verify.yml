name: Verify Helioigma

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check JavaScript syntax
        run: node --check game.js

      - name: Verify required public package files
        run: |
          set -euo pipefail
          for file in \
            index.html \
            styles.css \
            game.js \
            LICENSE \
            judge.html \
            judge-manifest.json \
            smoke.html \
            proof-verifier.html \
            publish-assistant.html \
            publish-after-repo.ps1 \
            public-preflight.ps1 \
            tools/build-demo-video.mjs \
            tools/build-demo-webm.mjs \
            tools/browser-smoke-check.mjs \
            dev-submit-console.html \
            dev-article-final.md \
            verification.html \
            verification-report.md \
            cover.png \
            solstice-cipher-demo.mp4 \
            solstice-cipher-demo.webm \
            solstice-cipher-demo.gif \
            desktop-check-v5.png \
            mobile-check-v6.png \
            desktop-complete-v4.png \
            PUBLISHING.md \
            submission-checklist.md
          do
            test -s "$file"
          done
          test "$(find demo-frames-v3 -maxdepth 1 -name '*.png' | wc -l)" -ge 7

      - name: Verify DEV challenge submission copy
        run: |
          set -euo pipefail
          grep -q "tags: devchallenge, gamechallenge, gamedev" dev-article-final.md
          grep -q "Helioigma" dev-article-final.md
          grep -q "solar rotor" dev-article-final.md
          grep -q "solstice-cipher-demo.gif" dev-article-final.md
          grep -q "solstice-cipher-demo.webm" dev-article-final.md
          grep -q "Helioigma four-phase demo solve" dev-article-final.md
          grep -q "MIT license for the game package" dev-article-final.md
          grep -q "https://ooyxloo.github.io/solstice-cipher/" dev-article-final.md
          grep -q "https://ooyxloo.github.io/solstice-cipher/?demo=1" dev-article-final.md
          grep -q "What I Built" dev-article-final.md
          grep -q "Video Demo" dev-article-final.md
          grep -q "Code" dev-article-final.md
          grep -q "How I Built It" dev-article-final.md
          grep -q "Prize Category" dev-article-final.md
          grep -q "An Ode with Restraint" dev-article-final.md
          grep -q "not a biography game" dev-article-final.md
          grep -q "careful reasoning about machines and proof" dev-article-final.md
          grep -q "Judge in 60 Seconds" dev-article-final.md
          grep -q "judge-manifest.json" dev-article-final.md
          grep -q "Rubric Fit" dev-article-final.md
          grep -q "I chose a cipher wheel" dev-article-final.md
          grep -q "biggest tradeoff" dev-article-final.md
          grep -q "only browser storage is a local numeric best-score key" dev-article-final.md
          grep -q "public-preflight.ps1 -Public" dev-article-final.md
          grep -q "proof-verifier.html" dev-article-final.md
          grep -q "publish-assistant.html" PUBLISHING.md
          grep -q "devchallenge, gamechallenge, gamedev" dev-submit-console.html
          grep -q "Helioigma" dev-submit-console.html
          grep -q "Judge in 60 Seconds" dev-submit-console.html
          grep -q "judge-manifest.json" dev-submit-console.html
          grep -q "Rubric Fit" dev-submit-console.html
          grep -q "Ode With Restraint" dev-submit-console.html
          grep -q "Rotor Trace" dev-submit-console.html
          grep -q "How I Built It" dev-submit-console.html
          grep -q "WebM video" dev-submit-console.html
          grep -q 'Optional `?demo=1` route' dev-submit-console.html
          grep -q "public-preflight.ps1 -Public" dev-submit-console.html
          grep -q "only browser storage is the local numeric best score key" README.md
          grep -q "The Turing ode is intentionally restrained" README.md
          grep -q "Rotor Trace" README.md
          grep -q "?demo=1" README.md
          grep -q "MIT license" README.md
          grep -q "MIT License" LICENSE
          grep -q "judge-manifest.json" submission-checklist.md
          grep -q "judge-manifest.json" PUBLISHING.md

      - name: Verify judge and smoke links
        run: |
          set -euo pipefail
          grep -q "solstice-cipher-demo.gif" judge.html
          grep -q "solstice-cipher-demo.webm" judge.html
          grep -q "Helioigma" judge.html
          grep -q "Verify Receipt" judge.html
          grep -q "judge-manifest.json" judge.html
          grep -q "Open Manifest" judge.html
          grep -q "Watch Video" judge.html
          grep -q "Auto Demo" judge.html
          grep -q "Run Smoke Test" judge.html
          grep -q "verification.html" judge.html
          grep -q "Run Receipt" judge.html
          grep -q "Ode With Restraint" judge.html
          grep -q "Rotor Trace" judge.html
          grep -q "state, logic, verification" judge.html
          ! grep -q "DEV Console" judge.html
          ! grep -q "Publish Assistant" judge.html
          grep -q "PASS - Longest day held" verification-report.md
          grep -q "SC-4P-2907-62-Y5VFX1" verification-report.md
          grep -q "SC-4P-2907-62-Y5VFX1" judge-manifest.json
          grep -q "Best Ode to Alan Turing" judge-manifest.json
          grep -q "ode_note" judge-manifest.json
          grep -q "expected_smoke_checks" judge-manifest.json
          grep -q "41" judge-manifest.json
          grep -q "https://ooyxloo.github.io/solstice-cipher/" judge-manifest.json
          grep -q "https://ooyxloo.github.io/solstice-cipher/?demo=1" judge-manifest.json
          grep -q "SC-4P-2907-62-Y5VFX1" proof-verifier.html
          grep -q "proofFacts" proof-verifier.html
          grep -q "Parsed receipt facts" proof-verifier.html
          grep -q "Valid run receipt" proof-verifier.html
          grep -q 'get("receipt")' proof-verifier.html
          grep -q "not anti-cheat or identity proof" proof-verifier.html
          grep -q "parsed receipt facts" verification-report.md
          grep -q "solstice-cipher-demo.webm" verification-report.md
          grep -q "Score variance is expected" verification-report.md
          grep -q "Score variance is expected" verification.html
          grep -q "No-go gate" publish-assistant.html
          grep -q "publish-after-repo helper" publish-after-repo.ps1
          grep -q "live browser recording" tools/build-demo-video.mjs
          grep -q "SC-4P-2907-62-Y5VFX1" tools/build-demo-video.mjs
          grep -q "demo-frames-v3" tools/build-demo-webm.mjs
          grep -q "video/webm" tools/browser-smoke-check.mjs
          grep -q "auto demo route did not reach the stable receipt" tools/browser-smoke-check.mjs
          grep -q "auto demo route did not build a verifier link" tools/browser-smoke-check.mjs
          grep -q "solstice-cipher-dev-package.zip" .gitignore
          grep -q "nodeButtons" index.html
          grep -q "phaseTrack" index.html
          grep -q "shiftLabel" index.html
          grep -q "hintButton" index.html
          grep -q "tracePanel" index.html
          grep -q "traceNext" index.html
          grep -q "demoButton" index.html
          grep -q "quick-controls" index.html
          grep -q "judge-links" index.html
          grep -q "proofSummary" index.html
          grep -q "verifyProofLink" index.html
          grep -q "Helioigma" index.html
          grep -q "Decode the solstice rotor" index.html
          grep -q "https://ooyxloo.github.io/solstice-cipher/cover.png" index.html
          grep -q "twitter:image" index.html
          grep -q 'aria-keyshortcuts="H"' index.html
          grep -q "first-phase node buttons are present" smoke.html
          grep -q "hint button is present" smoke.html
          grep -q "hint shortcut is exposed" smoke.html
          grep -q "hint shortcut names the next mismatched node" smoke.html
          grep -q "hint highlights a node button" smoke.html
          grep -q "rotor trace panel is present" smoke.html
          grep -q "rotor trace records hint action" smoke.html
          grep -q "demo solve button is present" smoke.html
          grep -q "judge shortcut links include the auto demo route" smoke.html
          grep -q "demo shortcut reaches a deterministic judge receipt" smoke.html
          grep -q "run receipt verifier link is present" smoke.html
          grep -q "completion verifier link carries the final receipt" smoke.html
          grep -q "demo solve releases manual controls" smoke.html
          grep -q "four-phase progress track is present" smoke.html
          grep -q "shift counter records the completed run" smoke.html
          grep -q "devchallenge" verification.html
          grep -q "SC-4P" smoke.html

      - name: Install browser smoke dependency
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Rebuild demo video
        run: node tools/build-demo-video.mjs

      - name: Run browser smoke
        run: node tools/browser-smoke-check.mjs
