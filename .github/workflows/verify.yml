name: Verify Helioigma

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check JavaScript syntax
        run: node --check game.js

      - name: Verify required public package files
        run: |
          set -euo pipefail
          for file in \
            index.html \
            styles.css \
            game.js \
            LICENSE \
            judge.html \
            judge-manifest.json \
            smoke.html \
            proof-verifier.html \
            publish-assistant.html \
            publish-after-repo.ps1 \
            public-preflight.ps1 \
            tools/build-demo-video.mjs \
            tools/build-demo-webm.mjs \
            tools/browser-smoke-check.mjs \
            dev-submit-console.html \
            dev-article-final.md \
            verification.html \
            verification-report.md \
            cover.png \
            helioigma-demo.mp4 \
            helioigma-demo.webm \
            helioigma-demo.gif \
            desktop-check-v5.png \
            mobile-check-v6.png \
            desktop-complete-v4.png \
            PUBLISHING.md \
            submission-checklist.md
          do
            test -s "$file"
          done
          test "$(find demo-frames-v3 -maxdepth 1 -name '*.png' | wc -l)" -ge 7

      - name: Verify DEV challenge submission copy
        run: |
          set -euo pipefail
          grep -q "tags: devchallenge, gamechallenge, gamedev" dev-article-final.md
          grep -q "Helioigma" dev-article-final.md
          grep -q "solar rotor" dev-article-final.md
          grep -q "You get 45 seconds of daylight" dev-article-final.md
          grep -q "live objective strip tells you what the rotor wants next" dev-article-final.md
          grep -q "compact proof that the solve path can be inspected" dev-article-final.md
          grep -q "I am aiming this at Best Ode to Alan Turing by making the tribute playable" dev-article-final.md
          grep -q "helioigma-demo.gif" dev-article-final.md
          grep -q "helioigma-demo.webm" dev-article-final.md
          grep -q "Completion screenshot with receipt ledger" dev-article-final.md
          grep -q "Helioigma four-phase demo solve" dev-article-final.md
          grep -q "MIT license for the game package" dev-article-final.md
          grep -q "https://ooyxloo.github.io/helioigma/" dev-article-final.md
          grep -q "https://ooyxloo.github.io/helioigma/?demo=1" dev-article-final.md
          grep -q "What I Built" dev-article-final.md
          grep -q "Video Demo" dev-article-final.md
          grep -q "Code" dev-article-final.md
          grep -q "How I Built It" dev-article-final.md
          grep -q "Prize Category" dev-article-final.md
          grep -q "An Ode with Restraint" dev-article-final.md
          grep -q "not a biography game" dev-article-final.md
          grep -q "careful reasoning about machines and proof" dev-article-final.md
          grep -q "Judge in 60 Seconds" dev-article-final.md
          grep -q "My award thesis is simple" dev-article-final.md
          grep -q "playable ode, a judge-verifiable loop, and a finished static package" dev-article-final.md
          grep -q "judge-manifest.json" dev-article-final.md
          grep -q "Rubric Fit" dev-article-final.md
          grep -q "I chose a cipher wheel" dev-article-final.md
          grep -q "biggest tradeoff" dev-article-final.md
          grep -q "only browser storage is a local numeric best-score key" dev-article-final.md
          grep -q "Originality and Build Window" dev-article-final.md
          grep -q "not a wrapper around a prior game template" dev-article-final.md
          grep -q "No third-party game template, stock-art pack, private dataset, backend service, API key, or account-local state" dev-article-final.md
          grep -q "public-preflight.ps1 -Public" dev-article-final.md
          grep -q "proof-verifier.html" dev-article-final.md
          grep -q "publish-assistant.html" PUBLISHING.md
          grep -q "devchallenge, gamechallenge, gamedev" dev-submit-console.html
          grep -q "Helioigma" dev-submit-console.html
          grep -q "You get 45 seconds of daylight" dev-submit-console.html
          grep -q "live objective strip tells you what the rotor wants next" dev-submit-console.html
          grep -q "Judge in 60 Seconds" dev-submit-console.html
          grep -q "judge-manifest.json" dev-submit-console.html
          grep -q "Sample receipt verifier" dev-submit-console.html
          grep -q "proof-verifier.html?receipt=SC-4P-2907-62-Y5VFX1" dev-submit-console.html
          grep -q "Rubric Fit" dev-submit-console.html
          grep -q "Ode With Restraint" dev-submit-console.html
          grep -q "Rotor Trace" dev-submit-console.html
          grep -q "How I Built It" dev-submit-console.html
          grep -q "WebM video" dev-submit-console.html
          grep -q "Completion screenshot with receipt ledger" dev-submit-console.html
          grep -q 'Optional `?demo=1` route' dev-submit-console.html
          grep -q "Originality Note" dev-submit-console.html
          grep -q "not a wrapper around a prior game template" dev-submit-console.html
          grep -q "No third-party game template, stock-art pack, private dataset, backend service, API key, or account-local state" dev-submit-console.html
          grep -q "public-preflight.ps1 -Public" dev-submit-console.html
          grep -q "only browser storage is the local numeric best score key" README.md
          grep -q "GitHub Pages-ready static game package" README.md
          grep -q "Owner-only publishing helpers are included" README.md
          grep -q "Owner Launch Helpers" README.md
          ! grep -q "Public repository, GitHub Pages, and DEV submission are account-owner launch gates" README.md
          ! grep -q "if the user authorizes public publishing" README.md
          grep -q "The Turing ode is intentionally restrained" README.md
          grep -q "Award thesis: Helioigma is a playable ode" README.md
          grep -q "first-move coach on Start" README.md
          grep -q "Originality and Review Transparency" README.md
          grep -q "No third-party game template, stock-art pack, private dataset, backend service, API key, or account-local state" README.md
          grep -q "Rotor Trace" README.md
          grep -q "final run receipt ledger" README.md
          grep -q "?demo=1" README.md
          grep -q "MIT license" README.md
          grep -q "MIT License" LICENSE
          grep -q "judge-manifest.json" submission-checklist.md
          grep -q "sample receipt verifier URL" submission-checklist.md
          grep -q "56 expected smoke checks" submission-checklist.md
          grep -q "judge-manifest.json" PUBLISHING.md

      - name: Verify judge and smoke links
        run: |
          set -euo pipefail
          grep -q "helioigma-demo.gif" judge.html
          grep -q "helioigma-demo.webm" judge.html
          grep -q "Helioigma" judge.html
          grep -q "Verify Receipt" judge.html
          grep -q "judge-manifest.json" judge.html
          grep -q "Open Manifest" judge.html
          grep -q "Watch Video" judge.html
          grep -q "Auto Demo" judge.html
          grep -q "Run Smoke Test" judge.html
          grep -q "60-second review path" judge.html
          grep -q "Award thesis" judge.html
          grep -q "Playable ode" judge.html
          grep -q "Judge-verifiable" judge.html
          grep -q "Finished surface" judge.html
          grep -q "Primary judge actions" judge.html
          grep -q "Play First." judge.html
          grep -q "tactile node pulse" judge.html
          grep -q "Evidence links" judge.html
          grep -q "Watch the playable page complete all four phases" judge.html
          grep -q "Verify the browser path reaches 56 checks" judge.html
          grep -q "award signals" judge.html
          ! grep -q "Watch the public page complete all four phases" judge.html
          grep -q "verification.html" judge.html
          grep -q "Run Receipt" judge.html
          grep -q "proof-verifier.html?receipt=SC-4P-2907-62-Y5VFX1" judge.html
          grep -q "prefilled sample verifier" judge.html
          grep -q "Ode With Restraint" judge.html
          grep -q "Rotor Trace" judge.html
          grep -q "state, logic, verification" judge.html
          ! grep -q "DEV Console" judge.html
          ! grep -q "Publish Assistant" judge.html
          grep -q "PASS - Longest day held" verification-report.md
          grep -q "completion screenshot with final receipt, phase scoring ledger, and Judge run summary" verification-report.md
          grep -q "GIF preview ending on the receipt ledger and Judge run summary" verification-report.md
          grep -q "SC-4P-2907-62-Y5VFX1" verification-report.md
          grep -q "SC-4P-2907-62-Y5VFX1" judge-manifest.json
          grep -q "Best Ode to Alan Turing" judge-manifest.json
          grep -q "ode_note" judge-manifest.json
          grep -q "expected_smoke_checks" judge-manifest.json
          grep -q "award_thesis" judge-manifest.json
          grep -q "public_review_surface" judge-manifest.json
          grep -q "owner_publication_note" judge-manifest.json
          grep -q "owner_actions_not_automated" judge-manifest.json
          grep -q "originality" judge-manifest.json
          grep -q "template_boundary" judge-manifest.json
          grep -q "asset_boundary" judge-manifest.json
          grep -q "56" judge-manifest.json
          grep -q "award signals" judge-manifest.json
          grep -q "https://ooyxloo.github.io/helioigma/" judge-manifest.json
          grep -q "https://ooyxloo.github.io/helioigma/?demo=1" judge-manifest.json
          grep -q "sample_receipt_verifier" judge-manifest.json
          grep -q "https://ooyxloo.github.io/helioigma/proof-verifier.html?receipt=SC-4P-2907-62-Y5VFX1" judge-manifest.json
          grep -q "SC-4P-2907-62-Y5VFX1" proof-verifier.html
          grep -q "proofFacts" proof-verifier.html
          grep -q "Parsed receipt facts" proof-verifier.html
          grep -q "Checksum-valid receipt" proof-verifier.html
          grep -q 'get("receipt")' proof-verifier.html
          grep -q "not anti-cheat or identity proof" proof-verifier.html
          grep -q "What this proves" proof-verifier.html
          grep -q "What this does not prove" proof-verifier.html
          grep -q "solstice|4|2907|62|4" proof-verifier.html
          grep -q "parsed receipt facts" verification-report.md
          grep -q "helioigma-demo.webm" verification-report.md
          grep -q "Score variance is expected" verification-report.md
          grep -q "Score variance is expected" verification.html
          grep -q "No-go gate" publish-assistant.html
          grep -q "publish-after-repo helper" publish-after-repo.ps1
          grep -q "Assert-CleanWorktreeForPush" publish-after-repo.ps1
          grep -q "Commit the verified Helioigma package before pushing" publish-after-repo.ps1
          grep -q "live browser recording" tools/build-demo-video.mjs
          grep -q "SC-4P-2907-62-Y5VFX1" tools/build-demo-video.mjs
          grep -q "demo-frames-v3" tools/build-demo-webm.mjs
          grep -q "video/webm" tools/browser-smoke-check.mjs
          grep -q "auto demo route did not reach the stable receipt" tools/browser-smoke-check.mjs
          grep -q "auto demo route did not build a verifier link" tools/browser-smoke-check.mjs
          grep -q "first screen sample verifier link is not prefilled" tools/browser-smoke-check.mjs
          grep -q "judge page verifier action is not prefilled" tools/browser-smoke-check.mjs
          grep -q "mobile first viewport shows too little gameplay canvas" tools/browser-smoke-check.mjs
          grep -q "demo button judge route label is not exposed" tools/browser-smoke-check.mjs
          grep -q "expected 56 smoke checks" tools/browser-smoke-check.mjs
          grep -q "auto demo route did not expose award signals" tools/browser-smoke-check.mjs
          grep -q "helioigma-dev-package.zip" .gitignore
          grep -q "nodeButtons" index.html
          grep -q "phaseTrack" index.html
          grep -q "objective-strip" index.html
          grep -q "phaseObjective" index.html
          grep -q "phaseTargetLine" index.html
          grep -q "phaseAlignment" index.html
          grep -q "shiftLabel" index.html
          grep -q "hintButton" index.html
          grep -q "tracePanel" index.html
          grep -q "traceNext" index.html
          grep -q "phaseAnnouncer" index.html
          grep -q "demoButton" index.html
          grep -q "Demo Solve full judge route" index.html
          grep -q "quick-controls" index.html
          grep -q "judge-links" index.html
          grep -q "Verify sample" index.html
          grep -q "proof-verifier.html?receipt=SC-4P-2907-62-Y5VFX1" index.html
          grep -q "proofSummary" index.html
          grep -q "phaseLedger" index.html
          grep -q "verifyProofLink" index.html
          grep -q "Helioigma" index.html
          grep -q "Decode the solstice rotor" index.html
          grep -q "20260614-award-signals" index.html
          grep -q "Award signals" index.html
          grep -q "https://ooyxloo.github.io/helioigma/cover.png" index.html
          grep -q "twitter:image" index.html
          grep -q 'aria-keyshortcuts="H"' index.html
          grep -q "first-phase node buttons are present" smoke.html
          grep -q "20260614-award-signals" smoke.html
          grep -q "award signals are present" smoke.html
          grep -q "demo award signals name solstice, Turing, and judge proof" smoke.html
          grep -q "hint button is present" smoke.html
          grep -q "hint shortcut is exposed" smoke.html
          grep -q "hint shortcut names the next mismatched node" smoke.html
          grep -q "hint highlights a node button" smoke.html
          grep -q "rotor trace panel is present" smoke.html
          grep -q "rotor trace records hint action" smoke.html
          grep -q "demo solve button is present" smoke.html
          grep -q "phase objective strip is present" smoke.html
          grep -q "phase objective names the first phase" smoke.html
          grep -q "phase objective shows target glyphs and alignment" smoke.html
          grep -q "start button shows the first-move coach" smoke.html
          grep -q "judge shortcut links include the auto demo route" smoke.html
          grep -q "demo shortcut reaches a deterministic judge receipt" smoke.html
          grep -q "run receipt verifier link is present" smoke.html
          grep -q "completion verifier link carries the final receipt" smoke.html
          grep -q "demo solve releases manual controls" smoke.html
          grep -q "four-phase progress track is present" smoke.html
          grep -q "phase announcer is present" smoke.html
          grep -q "phase announcer names the active phase" smoke.html
          grep -q "phase scoring ledger is present" smoke.html
          grep -q "four phase ledger entries" smoke.html
          grep -q "shift counter records the completed run" smoke.html
          grep -q "devchallenge" verification.html
          grep -q "SC-4P" smoke.html

      - name: Install browser smoke dependency
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Run browser smoke on committed package
        run: node tools/browser-smoke-check.mjs

      - name: Rebuild demo video
        run: node tools/build-demo-video.mjs

      - name: Verify rebuilt demo video output
        run: test -s helioigma-demo.webm
