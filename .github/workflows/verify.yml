          grep -q "first screen sample verifier link is not prefilled" tools/browser-smoke-check.mjs
          grep -q "judge page verifier action is not prefilled" tools/browser-smoke-check.mjs
          grep -q "mobile first viewport shows too little gameplay canvas" tools/browser-smoke-check.mjs
          grep -q "demo button judge route label is not exposed" tools/browser-smoke-check.mjs
          grep -q "expected 69 smoke checks" tools/browser-smoke-check.mjs
          grep -q "play rule no longer explains score and receipt" tools/browser-smoke-check.mjs
          grep -q "audio cues should default off" tools/browser-smoke-check.mjs
          grep -q "auto demo route did not expose award signals" tools/browser-smoke-check.mjs
          grep -q "helioigma-dev-package.zip" .gitignore
          grep -q "nodeButtons" index.html
